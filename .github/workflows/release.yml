name: Release

on:
  push:
    branches:
      - main
      - master

env:
  GO_VERSION: '1.24'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          
          mkdir -p build/bin
          
          for cmd in daemon disco gps-broadcaster; do
            if [ "$cmd" = "daemon" ]; then
              outfile="disco-daemon"
            elif [ "$cmd" = "gps-broadcaster" ]; then
              outfile="disco-gps-broadcaster"
            else
              outfile="disco"
            fi
            
            go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
              -o build/bin/${outfile}-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/${cmd}
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  build-nss-module:
    name: Build NSS Module
    runs-on: ubuntu-latest
    container:
      image: debian:bookworm
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y gcc libc6-dev

      - name: Build NSS module
        run: |
          mkdir -p build/lib
          gcc -fPIC -shared -o build/lib/libnss_disco.so.2 \
            -Wl,-soname,libnss_disco.so.2 \
            -Wall -Wextra -Werror \
            -D_GNU_SOURCE \
            -I/usr/include \
            libnss/nss_disco.c

      - name: Upload NSS module
        uses: actions/upload-artifact@v4
        with:
          name: nss-module
          path: build/lib/libnss_disco.so.2

  build-debian-packages:
    name: Build Debian Packages
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-arm64
          path: build/bin-arm64/

      - name: Download NSS module
        uses: actions/download-artifact@v4
        with:
          name: nss-module
          path: build/lib/

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev fakeroot

      - name: Build Debian packages
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || echo "0.0.0")
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          
          mkdir -p release/amd64 release/arm64
          
          for arch in amd64 arm64; do
            pkg_root="pkgroot-${arch}"
            mkdir -p ${pkg_root}/DEBIAN
            mkdir -p ${pkg_root}/usr/bin
            mkdir -p ${pkg_root}/lib
            mkdir -p ${pkg_root}/etc/disco
            mkdir -p ${pkg_root}/var/lib/disco
            mkdir -p ${pkg_root}/lib/systemd/system
            
            if [ "$arch" = "amd64" ]; then
              bin_dir="build/bin"
            else
              bin_dir="build/bin-arm64"
            fi
            
            cp ${bin_dir}/disco-daemon-linux-${arch} ${pkg_root}/usr/bin/disco-daemon
            cp ${bin_dir}/disco-linux-${arch} ${pkg_root}/usr/bin/disco
            cp build/lib/libnss_disco.so.2 ${pkg_root}/lib/
            cp config.yaml ${pkg_root}/etc/disco/config.yaml.example
            cp debian/disco-daemon.service ${pkg_root}/lib/systemd/system/disco-daemon.service
            chmod 755 ${pkg_root}/usr/bin/*
            chmod 644 ${pkg_root}/lib/*
            
            cat > ${pkg_root}/DEBIAN/control << EOF
          Package: disco
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: ${arch}
          Maintainer: Flip Hess <flip@offline-lab.org>
          Description: Complete Disco name service suite
           Disco provides automatic service discovery and name resolution
           across nodes in an offline network without requiring external DNS.
           .
           This package includes the daemon, CLI, and NSS module.
          EOF
            
            cat > ${pkg_root}/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e
          ldconfig 2>/dev/null || true
          systemctl daemon-reload 2>/dev/null || true
          EOF
            chmod 755 ${pkg_root}/DEBIAN/postinst
            
            dpkg-deb --build ${pkg_root} release/${arch}/disco_${VERSION}_${arch}.deb
          done

      - name: Upload Debian packages
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: release/

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module, build-debian-packages]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate version and tag
        id: version
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          COMMIT_COUNT=$(git rev-list --count HEAD)
          DATE=$(date +%Y.%m.%d)
          
          VERSION="v1.0.${COMMIT_COUNT}"
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a ${{ steps.version.outputs.version }} -m "Release ${{ steps.version.outputs.version }}"
          git push origin ${{ steps.version.outputs.version }}

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          cp artifacts/binaries-linux-amd64/* release-assets/
          cp artifacts/binaries-linux-arm64/* release-assets/
          cp artifacts/nss-module/libnss_disco.so.2 release-assets/
          cp -r artifacts/debian-packages/* release-assets/
          
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
