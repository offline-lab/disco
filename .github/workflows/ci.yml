---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.24'
  GOLANGCI_LINT_VERSION: 'v1.64.5'
  GORELEASER_VERSION: 'v2.7.0'

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1b6671e713fd51c7f28eb88acf29c9bf3c2eb15f  # v6.5.0
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97  # v4.6.0
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build-nss-module:
    name: Build NSS Module
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install dependencies
        run: apt-get update && apt-get install -y gcc libc6-dev

      - name: Build NSS module
        run: |
          mkdir -p build/lib
          gcc -fPIC -shared -o build/lib/libnss_disco.so.2 \
            -Wl,-soname,libnss_disco.so.2 \
            -Wall -Wextra -Werror \
            -D_GNU_SOURCE \
            -I/usr/include \
            libnss/nss_disco.c

      - name: Upload NSS module
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: nss-module
          path: build/lib/libnss_disco.so.2

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          DATE=$(date +%Y%m%d)
          VERSION="0.${DATE}.0"
          COMMIT=$(git rev-parse --short HEAD)

          mkdir -p build/bin

          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-daemon ./cmd/daemon
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco ./cmd/disco
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-gps-broadcaster ./cmd/gps-broadcaster

      - name: Upload artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download binaries
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download NSS module
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: nss-module
          path: build/lib/

      - name: Install NSS module
        run: |
          sudo cp build/lib/libnss_disco.so.2 /lib/x86_64-linux-gnu/
          sudo ldconfig

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run integration tests
        run: ./test/ci-integration-test.sh

  multi-node-test:
    name: Multi-Node Integration
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download binaries
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download NSS module
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: nss-module
          path: build/lib/

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run multi-node integration tests
        run: ./test/ci-multi-node-test.sh

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module, integration-test, multi-node-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34  # v5.3.0
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download all binaries
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: binaries-*
          path: build/bin
          merge-multiple: true

      - name: Download NSS module
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: nss-module
          path: build/lib/

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552  # v6.3.0
        with:
          version: ${{ env.GORELEASER_VERSION }}
          install-only: true

      - name: Generate version
        id: version
        run: |
          DATE=$(date +%Y%m%d)
          COUNTER=$(git tag -l "0.${DATE}.*" 2>/dev/null | sed "s/0\.${DATE}.//" | sort -n | tail -1)
          if [ -z "$COUNTER" ]; then
            COUNTER=1
          else
            COUNTER=$((COUNTER + 1))
          fi
          VERSION="0.${DATE}.${COUNTER}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552  # v6.3.0
        with:
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          push: false
          tags: disco-daemon:${{ github.sha }}
