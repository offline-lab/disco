---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.24'

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build-nss-module:
    name: Build NSS Module
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: apt-get update && apt-get install -y gcc libc6-dev

      - name: Build NSS module
        run: |
          mkdir -p build/lib
          gcc -fPIC -shared -o build/lib/libnss_disco.so.2 \
            -Wl,-soname,libnss_disco.so.2 \
            -Wall -Wextra -Werror \
            -D_GNU_SOURCE \
            -I/usr/include \
            libnss/nss_disco.c

      - name: Upload NSS module
        uses: actions/upload-artifact@v4
        with:
          name: nss-module
          path: build/lib/libnss_disco.so.2

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          DATE=$(date +%Y.%m.%d)
          VERSION="${DATE}.0"
          COMMIT=$(git rev-parse --short HEAD)

          mkdir -p build/bin

          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-daemon ./cmd/daemon
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco ./cmd/disco
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-gps-broadcaster ./cmd/gps-broadcaster

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module]
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download NSS module
        uses: actions/download-artifact@v4
        with:
          name: nss-module
          path: build/lib/

      - name: Install NSS module
        run: |
          sudo cp build/lib/libnss_disco.so.2 /lib/x86_64-linux-gnu/
          sudo ldconfig

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run integration tests
        run: ./test/ci-integration-test.sh

  multi-node-test:
    name: Multi-Node Integration
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module]
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download NSS module
        uses: actions/download-artifact@v4
        with:
          name: nss-module
          path: build/lib/

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run multi-node integration tests
        run: ./test/ci-multi-node-test.sh

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-nss-module, integration-test, multi-node-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: build/bin
          merge-multiple: true

      - name: Download NSS module
        uses: actions/download-artifact@v4
        with:
          name: nss-module
          path: build/lib/

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          install-only: true

      - name: Generate version
        id: version
        run: |
          DATE=$(date +%Y.%m.%d)
          # Find highest counter for today's tags
          COUNTER=$(git tag -l "v${DATE}.*" 2>/dev/null | sed "s/v${DATE}.//" | sort -n | tail -1)
          if [ -z "$COUNTER" ]; then
            COUNTER=1
          else
            COUNTER=$((COUNTER + 1))
          fi
          VERSION="${DATE}.${COUNTER}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ steps.version.outputs.version }}

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: disco-daemon:${{ github.sha }}
