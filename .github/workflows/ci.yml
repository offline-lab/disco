---
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  GO_VERSION: '1.24'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)

          mkdir -p build/bin

          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-daemon ./cmd/daemon
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco ./cmd/disco
          go build -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${COMMIT}" \
            -o build/bin/disco-gps-broadcaster ./cmd/gps-broadcaster

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/bin/

  build-nss-module:
    name: Build NSS Module
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libc6-dev

      - name: Build NSS module
        run: |
          mkdir -p build/lib
          gcc -fPIC -shared -o build/lib/libnss_disco.so.2 \
            -Wl,-soname,libnss_disco.so.2 \
            -Wall -Wextra -Werror \
            -D_GNU_SOURCE \
            -I/usr/include \
            libnss/nss_disco.c

      - name: Upload NSS module
        uses: actions/upload-artifact@v4
        with:
          name: nss-module
          path: build/lib/libnss_disco.so.2

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build, build-nss-module]
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Download NSS module
        uses: actions/download-artifact@v4
        with:
          name: nss-module
          path: build/lib/

      - name: Install NSS module
        run: |
          sudo cp build/lib/libnss_disco.so.2 /lib/x86_64-linux-gnu/
          sudo ldconfig

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run integration tests
        run: |
          ./test/ci-integration-test.sh

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: disco-daemon:${{ github.sha }}

  multi-node-test:
    name: Multi-Node Integration
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux-amd64
          path: build/bin/

      - name: Make binaries executable
        run: chmod +x build/bin/*

      - name: Run multi-node integration tests
        run: |
          ./test/ci-multi-node-test.sh
