daemon:
  socket_path: "/run/disco.sock"
  broadcast_interval: 30s
  record_ttl: 3600s
  pid_file: "/var/run/disco.pid"

network:
  interfaces: ["eth0", "wlan0"]
  broadcast_addr: "255.255.255.255:5354"
  max_broadcast_rate: 10

discovery:
  enabled: true
  detect_services: true
  service_port_mapping:
    www: [80, 443]
    smtp: [25, 587]
    mail: [143, 993]
    xmpp: [5222, 5269]
    ssh: [22]
    ftp: [21]
  scan_interval: 60s

security:
  enabled: false
  key_path: "/etc/disco/keys.json"
  trusted_peers: "/etc/disco/trusted_peers.json"
  require_signed: false

logging:
  level: "info"
  format: "text"
  file: ""

time_sync:
  enabled: false
  min_sources: 2
  max_source_spread: 100ms
  max_stale_age: 30s
  max_dispersion: 1.0
  step_threshold: 128ms
  slew_threshold: 500us
  poll_interval: 60s
  require_signed: true
  allow_step_backward: false

health:
  grace_period: 60s
  expire_after: 3600s
  cleanup_interval: 30s

dns:
  enabled: false
  port: 53
  domain: "disco"
  bind_addresses:
    - "0.0.0.0"
  ttl_healthy: 30
  ttl_stale: 10

static_hosts: {}
