; PlatformIO Project Configuration File
; GPS Time Broadcaster for nss-daemon
; Build: pio run -e arduino

[env:arduino]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 115200

; GPS connected to Serial, Ethernet on SPI
build_flags = 
    -DUSE_ETHERNET=1

; For ESP8266/ESP32 with WiFi, use:
; [env:esp32]
; platform = espressif32
; board = esp32dev
; framework = arduino
; build_flags = -DUSE_WIFI=1
